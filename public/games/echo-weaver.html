<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Echo Weaver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; background: #0a0a1e; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
    #canvas { display: block; position: absolute; top: 0; left: 0; }
    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10,10,30,0.92); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(8px);
    }
    #overlay h1 { font-size: 2.5rem; color: #00ffff; text-shadow: 0 0 20px #00ffff; margin-bottom: 10px; }
    #overlay p { color: #aaa; margin-bottom: 30px; font-size: 1rem; text-align: center; max-width: 300px; line-height: 1.6; }
    .start-btn {
      padding: 14px 48px; font-size: 1.2rem; background: transparent;
      border: 2px solid #00ffff; color: #00ffff; border-radius: 40px; cursor: pointer;
      font-family: inherit; letter-spacing: 2px; text-transform: uppercase;
      transition: all 0.2s; box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }
    .start-btn:hover { background: rgba(0,255,255,0.1); box-shadow: 0 0 30px rgba(0,255,255,0.5); }
    #ui {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
      background: linear-gradient(transparent, rgba(10,10,30,0.8));
      z-index: 5; pointer-events: none;
    }
    .ui-btn {
      pointer-events: auto; padding: 8px 16px; font-size: 0.8rem; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2); color: #ccc; border-radius: 20px; cursor: pointer;
      font-family: inherit; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s;
    }
    .ui-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .ui-btn.active { border-color: #00ffff; color: #00ffff; background: rgba(0,255,255,0.1); }
    #bpm-display { color: #888; font-size: 0.85rem; margin-left: auto; }
    #status { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); 
      font-size: 0.75rem; color: rgba(255,255,255,0.4); pointer-events: none; z-index: 5; letter-spacing: 1px; }
    #node-type-bar {
      position: absolute; top: 14px; left: 14px; display: flex; gap: 8px; z-index: 5; pointer-events: none;
    }
    .type-badge {
      width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; border: 2px solid rgba(255,255,255,0.3); opacity: 0.8;
      pointer-events: auto; cursor: pointer; transition: all 0.2s;
    }
    .type-badge:hover { transform: scale(1.15); opacity: 1; }
    .type-badge.selected { border-color: white; opacity: 1; box-shadow: 0 0 12px currentColor; }
    .type-badge[data-type="0"] { background: rgba(255,0,255,0.3); color: #ff00ff; border-color: #ff00ff; }
    .type-badge[data-type="1"] { background: rgba(0,255,255,0.3); color: #00ffff; border-color: #00ffff; }
    .type-badge[data-type="2"] { background: rgba(255,255,0,0.3); color: #ffff00; border-color: #ffff00; }
    .type-badge[data-type="3"] { background: rgba(0,255,0,0.3); color: #00ff00; border-color: #00ff00; }
    #help-tip {
      position: absolute; top: 60px; left: 14px; font-size: 0.7rem; color: rgba(255,255,255,0.35);
      pointer-events: none; line-height: 1.7;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- Start screen -->
<div id="overlay">
  <h1>Echo Weaver</h1>
  <p>Build rhythmic networks by placing and connecting sound nodes. Pulses travel between them to create music.</p>
  <button class="start-btn" id="startBtn">Begin</button>
</div>

<!-- HUD -->
<div id="node-type-bar">
  <div class="type-badge selected" data-type="0" title="Tone">♪</div>
  <div class="type-badge" data-type="1" title="Delay">~</div>
  <div class="type-badge" data-type="2" title="Filter">⌿</div>
  <div class="type-badge" data-type="3" title="Trigger (beats)">●</div>
</div>
<div id="help-tip">Tap: add node<br>Drag: move<br>Drop on node: connect<br>Hold: delete</div>
<div id="status">ECHO WEAVER v2 · WASM</div>
<div id="ui">
  <button class="ui-btn active" id="btn-preset-0">Loop</button>
  <button class="ui-btn" id="btn-preset-1">Fan</button>
  <button class="ui-btn" id="btn-preset-2">Ring</button>
  <button class="ui-btn" id="btn-preset-3">Dual</button>
  <button class="ui-btn" id="btn-clear">Clear</button>
  <div id="bpm-display">
    <button class="ui-btn" id="btn-bpm-down">−</button>
    <span id="bpm-val">120</span> BPM
    <button class="ui-btn" id="btn-bpm-up">+</button>
  </div>
</div>

// ============================================================
// NODE COLORS & LABELS
// ============================================================
const NODE_COLORS = ['#ff00ff', '#00ffff', '#ffff00', '#00ff00'];
const NODE_NAMES  = ['Tone', 'Delay', 'Filter', 'Trigger'];
const NODE_RADIUS = 22;
const TRAIL_MAX   = 40;

// ============================================================
// CANVAS RENDERER
// ============================================================
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// AUDIO
// ============================================================
let audioCtx = null;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume();
}

function playNote(type, freq) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  switch (type) {
    case 0: // tone - sine
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.start(t); osc.stop(t + 0.6);
      break;
    case 1: // delay - triangle with echoes
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq * 0.5, t);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
      // second echo
      setTimeout(() => playEcho(freq * 0.5, 0.1, 0.2), 150);
      break;
    case 2: // filter - sweep sawtooth
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.25, t + 0.35);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.linearRampToValueAtTime(0, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
      break;
    case 3: // trigger - short click/kick
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80, t);
      osc.frequency.exponentialRampToValueAtTime(20, t + 0.15);
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
      break;
  }
}

function playEcho(freq, vol, dur) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur);
}

// ============================================================
// TRAIL SYSTEM (JS side - purely visual)
// ============================================================
const trails = [];
function addTrail(x1, y1, x2, y2) {
  if (trails.length >= TRAIL_MAX) trails.shift();
  trails.push({ x1, y1, x2, y2, age: 0, maxAge: 25 });
}

// ============================================================
// INTERACTION STATE
// ============================================================
let engine = null;
let bpm = 120;
let selectedType = 0;
let dragNodeId = null;
let dragStartX = 0, dragStartY = 0;
let hasMoved = false;
let longPressTimer = null;
let currentPreset = 0;

// Cache node positions for rendering connections/pulses
let nodeCache = {}; // id -> {x,y,type,freq,glowing}

// ============================================================
// RENDER LOOP
// ============================================================
let lastTime = 0;
function frame(ts) {
  const delta = Math.min(ts - lastTime, 100); // cap at 100ms
  lastTime = ts;

  if (engine) {
    // Tick WASM engine
    engine.tick(delta);

    // Get fired nodes for audio
    const fired = engine.get_fired_nodes();
    for (let i = 0; i < fired.length; i += 3) {
      const id   = fired[i];
      const freq = fired[i+1];
      const type = fired[i+2];
      playNote(type, freq);
    }

    // Rebuild node cache
    const nodeBuf = engine.get_nodes_buffer();
    nodeCache = {};
    for (let i = 0; i < nodeBuf.length; i += 6) {
      const id = nodeBuf[i];
      nodeCache[id] = {
        id, x: nodeBuf[i+1], y: nodeBuf[i+2],
        type: nodeBuf[i+3], freq: nodeBuf[i+4],
        glowing: nodeBuf[i+5] > 0.5
      };
    }

    // Get pulses
    const pulseBuf = engine.get_pulses_buffer();

    // Get connections
    const connBuf = engine.get_connections_buffer();

    // Add trails from arriving pulses (approximate: trail when pulse progress > 0.85)
    for (let i = 0; i < pulseBuf.length; i += 5) {
      const prog = pulseBuf[i+4];
      if (prog > 0.8 && Math.random() > 0.5) {
        addTrail(pulseBuf[i+2], pulseBuf[i+3], pulseBuf[i+2], pulseBuf[i+3]);
      }
    }

    // Age trails
    for (let i = trails.length - 1; i >= 0; i--) {
      trails[i].age++;
      if (trails[i].age > trails[i].maxAge) trails.splice(i, 1);
    }

    draw(connBuf, pulseBuf);
  }

  requestAnimationFrame(frame);
}

function draw(connBuf, pulseBuf) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  bg.addColorStop(0, '#1a1a3a');
  bg.addColorStop(1, '#0a0a1e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Trails
  for (const t of trails) {
    const alpha = (1 - t.age / t.maxAge) * 0.5;
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y1);
    ctx.lineTo(t.x2, t.y2);
    ctx.stroke();
  }

  // Connections
  if (connBuf) {
    ctx.setLineDash([8, 5]);
    ctx.lineWidth = 1.5;
    for (let i = 0; i < connBuf.length; i += 2) {
      const from = nodeCache[connBuf[i]];
      const to   = nodeCache[connBuf[i+1]];
      if (!from || !to) continue;
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // Nodes
  for (const n of Object.values(nodeCache)) {
    const color = NODE_COLORS[n.type];
    const r = NODE_RADIUS;
    const glow = n.glowing ? 20 : 8;

    // Glow
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur  = glow;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = color + (n.glowing ? 'cc' : '44');
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(NODE_NAMES[n.type][0], n.x, n.y);
  }

  // Pulses
  if (pulseBuf) {
    for (let i = 0; i < pulseBuf.length; i += 5) {
      const px = pulseBuf[i+2];
      const py = pulseBuf[i+3];
      const prog = pulseBuf[i+4];
      const alpha = 0.6 + 0.4 * Math.sin(prog * Math.PI);

      ctx.save();
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
      ctx.restore();
    }
  }

  // Drag indicator: connecting mode line
  if (dragNodeId && hasMoved) {
    const n = nodeCache[dragNodeId];
    if (n) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.setLineDash([4, 4]);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(n.x, n.y);
      ctx.lineTo(lastPointerX, lastPointerY);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

// ============================================================
// POINTER HANDLING
// ============================================================
let lastPointerX = 0, lastPointerY = 0;
let connectMode = false; // dragging FROM a node to connect

function getPointer(e) {
  if (e.touches && e.touches.length) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.changedTouches && e.changedTouches.length) {
    return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

function findNodeAt(x, y) {
  // Check against nodeCache
  for (const n of Object.values(nodeCache)) {
    const dx = n.x - x, dy = n.y - y;
    if (dx*dx + dy*dy <= (NODE_RADIUS + 8) * (NODE_RADIUS + 8)) return n.id;
  }
  return null;
}

function onPointerDown(e) {
  if (!engine) return;
  e.preventDefault();
  const {x, y} = getPointer(e);
  lastPointerX = x; lastPointerY = y;
  hasMoved = false;
  dragStartX = x; dragStartY = y;

  const hit = findNodeAt(x, y);
  if (hit !== null) {
    dragNodeId = hit;
    connectMode = true; // Initially assume connect mode; if they just release w/o move -> no connect
    // Long press = delete
    longPressTimer = setTimeout(() => {
      if (dragNodeId === hit && !hasMoved) {
        engine.remove_node(hit);
        dragNodeId = null;
        navigator.vibrate?.(60);
      }
    }, 600);
  }
  // else: tapping empty space will addNode on pointerup if no move
}

function onPointerMove(e) {
  if (!engine) return;
  e.preventDefault();
  const {x, y} = getPointer(e);
  lastPointerX = x; lastPointerY = y;

  const dx = x - dragStartX, dy = y - dragStartY;
  if (!hasMoved && dx*dx + dy*dy > 64) {
    hasMoved = true;
    clearTimeout(longPressTimer);
  }

  if (hasMoved && dragNodeId !== null) {
    // Move the node
    engine.move_node(dragNodeId, x, y);
  }
}

function onPointerUp(e) {
  if (!engine) return;
  e.preventDefault();
  clearTimeout(longPressTimer);

  const {x, y} = getPointer(e);

  if (dragNodeId !== null) {
    if (hasMoved) {
      // Drop: check if over another node -> connect
      const overNode = findNodeAt(x, y);
      if (overNode !== null && overNode !== dragNodeId) {
        engine.connect(dragNodeId, overNode);
      }
    }
    // (no tap action on a node - that's just selection)
    dragNodeId = null;
  } else if (!hasMoved) {
    // Tap on empty space: add node
    if (engine.node_count() < 16) {
      engine.add_node(x, y, selectedType);
    }
  }

  hasMoved = false;
}

canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
canvas.addEventListener('pointermove', onPointerMove, { passive: false });
canvas.addEventListener('pointerup',   onPointerUp,   { passive: false });
canvas.addEventListener('pointercancel', () => { dragNodeId = null; clearTimeout(longPressTimer); });

// ============================================================
// TYPE SELECTOR
// ============================================================
document.querySelectorAll('.type-badge').forEach(el => {
  el.addEventListener('click', () => {
    selectedType = parseInt(el.dataset.type);
    document.querySelectorAll('.type-badge').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  });
});

// ============================================================
// UI BUTTONS
// ============================================================
function updatePresetButtons() {
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`btn-preset-${i}`);
    if (btn) btn.classList.toggle('active', i === currentPreset);
  }
}

[0,1,2,3].forEach(i => {
  const btn = document.getElementById(`btn-preset-${i}`);
  if (btn) btn.addEventListener('click', () => {
    if (!engine) return;
    currentPreset = i;
    engine.load_preset(i, canvas.width, canvas.height);
    updatePresetButtons();
  });
});

document.getElementById('btn-clear').addEventListener('click', () => {
  if (engine) engine.clear();
  currentPreset = -1;
  updatePresetButtons();
});

document.getElementById('btn-bpm-down').addEventListener('click', () => {
  bpm = Math.max(40, bpm - 10);
  document.getElementById('bpm-val').textContent = bpm;
  if (engine) engine.set_bpm(bpm);
});
document.getElementById('btn-bpm-up').addEventListener('click', () => {
  bpm = Math.min(300, bpm + 10);
  document.getElementById('bpm-val').textContent = bpm;
  if (engine) engine.set_bpm(bpm);
});

// ============================================================
// START
// ============================================================
document.getElementById('startBtn').addEventListener('click', async () => {
  initAudio();

  // Init WASM engine
  engine = new GameEngine(bpm);
  engine.load_preset(0, canvas.width, canvas.height);
  updatePresetButtons();

  document.getElementById('overlay').style.display = 'none';
  lastTime = performance.now();
  requestAnimationFrame(frame);
});
</script>

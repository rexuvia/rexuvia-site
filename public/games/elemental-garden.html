<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Alchemy</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-panel: #16213e;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #e0e0e0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            overscroll-behavior: none;
            overflow: hidden;
        }

        /* Sidebar Container */
        #sidebar {
            width: 320px;
            background: var(--bg-panel);
            padding: 20px;
            overflow-y: auto;
            border-right: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 200;
            box-shadow: 2px 0 15px rgba(0,0,0,0.5);
        }

        #sidebar h2 {
            margin: 0 0 10px 0;
            color: var(--accent);
            text-align: center;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stats {
            text-align: center;
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 10px;
        }

        #element-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .element-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 5px;
            background: var(--primary);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: grab;
            user-select: none;
            transition: all 0.2s ease;
            touch-action: none; /* Crucial for pointer events */
        }

        .element-btn:hover {
            background: #144075;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .element-btn:active {
            cursor: grabbing;
        }

        .element-emoji {
            font-size: 32px;
            margin-bottom: 5px;
            pointer-events: none;
        }

        .element-name {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* Workspace Canvas */
        #workspace {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #22223b 0%, var(--bg-dark) 100%);
        }

        .canvas-item {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            cursor: grab;
            user-select: none;
            
            transform: translate(-50%, -50%);
            transition: filter 0.2s, opacity 0.3s, transform 0.05s linear;
            z-index: 10;
            touch-action: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
        }

        .canvas-item:active {
            cursor: grabbing;
            z-index: 100 !important;
        }

        .canvas-item .element-emoji {
            font-size: 48px;
            margin: 0;
        }

        .canvas-item .element-name {
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: -5px;
            pointer-events: none;
        }

        .canvas-item.dragging {
            z-index: 100;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.8)) brightness(1.2);
        }

        .canvas-item.combining {
            animation: combineAnim 0.4s ease-out forwards;
        }

        .canvas-item.new-discovery {
            animation: popAnim 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #clear-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            z-index: 150;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }

        #clear-btn:hover {
            background: #ff5c77;
        }

        @keyframes combineAnim {
            0% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); filter: brightness(2) drop-shadow(0 0 20px white); }
            100% { transform: translate(-50%, -50%) scale(0); filter: brightness(0); opacity: 0; }
        }

        @keyframes popAnim {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            #sidebar { width: 100%; height: 35vh; border-right: none; border-top: 2px solid var(--primary); }
            #workspace { height: 65vh; }
            .canvas-item .element-emoji { font-size: 40px; }
            #element-list { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Alchemy</h2>
        <div class="stats" id="stats">Unlocked: 4 / ?</div>
        <div id="element-list"></div>
    </div>
    
    <div id="workspace">
        <button id="clear-btn">Clear Workspace</button>
    </div>

    <script>
        /**
         * MODULAR CONFIGURATION
         * Easily add new elements and recipes here.
         */
        const ELEMENTS = {
            earth: { name: 'Earth', emoji: '🪨' },
            water: { name: 'Water', emoji: '💧' },
            fire: { name: 'Fire', emoji: '🔥' },
            air: { name: 'Air', emoji: '💨' },
            mud: { name: 'Mud', emoji: '💩' },
            steam: { name: 'Steam', emoji: '♨️' },
            lava: { name: 'Lava', emoji: '🌋' },
            dust: { name: 'Dust', emoji: '🌫️' },
            energy: { name: 'Energy', emoji: '⚡' },
            rain: { name: 'Rain', emoji: '🌧️' },
            plant: { name: 'Plant', emoji: '🌱' },
            stone: { name: 'Stone', emoji: '🧱' },
            metal: { name: 'Metal', emoji: '⚙️' },
            glass: { name: 'Glass', emoji: '🔍' },
            sand: { name: 'Sand', emoji: '🏜️' },
            cloud: { name: 'Cloud', emoji: '☁️' },
            storm: { name: 'Storm', emoji: '⛈️' },
            life: { name: 'Life', emoji: '🧬' },
            golem: { name: 'Golem', emoji: '🗿' },
        };

        const RECIPES = {
            'earth+water': 'mud',
            'fire+water': 'steam',
            'earth+fire': 'lava',
            'air+earth': 'dust',
            'air+fire': 'energy',
            'air+water': 'rain',
            'earth+rain': 'plant',
            'fire+mud': 'stone',
            'energy+stone': 'metal',
            'fire+stone': 'metal',
            'air+dust': 'sand',
            'fire+sand': 'glass',
            'air+steam': 'cloud',
            'cloud+energy': 'storm',
            'energy+mud': 'life',
            'life+stone': 'golem',
            'earth+life': 'plant'
        };

        // State
        const unlockedElements = new Set(['earth', 'water', 'fire', 'air']);
        const DOM = {
            sidebarList: document.getElementById('element-list'),
            workspace: document.getElementById('workspace'),
            stats: document.getElementById('stats'),
            clearBtn: document.getElementById('clear-btn')
        };
        
        let highestZ = 10;
        let activeDrag = null;

        /**
         * INITIALIZATION
         */
        function init() {
            renderSidebar();
            DOM.clearBtn.addEventListener('click', clearWorkspace);
            
            // Prevent default drag behaviors that interfere with pointer events
            document.addEventListener('dragstart', e => e.preventDefault());
        }

        function updateStats() {
            DOM.stats.innerText = `Unlocked: ${unlockedElements.size} / ${Object.keys(ELEMENTS).length}`;
        }

        function renderSidebar() {
            DOM.sidebarList.innerHTML = '';
            
            // Render in alphabetical order by name, or creation order
            Array.from(unlockedElements).forEach(id => {
                const elData = ELEMENTS[id];
                const btn = document.createElement('div');
                btn.className = 'element-btn';
                btn.dataset.id = id;
                btn.innerHTML = `
                    <div class="element-emoji">${elData.emoji}</div>
                    <div class="element-name">${elData.name}</div>
                `;
                
                // Pointer down creates a new canvas item and starts dragging it
                btn.addEventListener('pointerdown', (e) => handleSidebarPointerDown(e, id));
                DOM.sidebarList.appendChild(btn);
            });
            updateStats();
        }

        /**
         * SPAWN & DRAG LOGIC
         */
        function handleSidebarPointerDown(e, id) {
            e.preventDefault();
            
            // Spawn new element in workspace at pointer coordinates
            const canvasItem = createCanvasItem(id, e.clientX, e.clientY);
            
            // Immediately start dragging it
            startDragging(canvasItem, e);
        }

        function createCanvasItem(id, x, y, isNew = false) {
            const elData = ELEMENTS[id];
            const item = document.createElement('div');
            item.className = 'canvas-item' + (isNew ? ' new-discovery' : '');
            item.dataset.id = id;
            item.style.left = x + 'px';
            item.style.top = y + 'px';
            item.style.zIndex = ++highestZ;
            
            item.innerHTML = `
                <div class="element-emoji">${elData.emoji}</div>
                <div class="element-name">${elData.name}</div>
            `;
            
            item.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                startDragging(item, e);
            });
            
            DOM.workspace.appendChild(item);
            
            // Cleanup animation class
            if (isNew) {
                setTimeout(() => item.classList.remove('new-discovery'), 500);
            }
            
            return item;
        }

        
        function startDragging(item, e) {
            item.style.zIndex = ++highestZ;
            item.classList.add('dragging');
            
            const rect = item.getBoundingClientRect();
            // Calculate offset. If it's a new item, rect might be centered at clientX/Y.
            // But if we just assume no offset when spawning:
            const offsetX = e.offsetX ? e.offsetX - 35 : 0; // 35 is half the 70px width
            const offsetY = e.offsetY ? e.offsetY - 35 : 0;
            
            activeDrag = { item, offsetX: 0, offsetY: 0 }; 
            // Setting offsets to 0 ensures it snaps exactly to your finger!
            
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerup', onPointerUp);
            document.addEventListener('pointercancel', onPointerUp);
            
            item.style.left = e.clientX + 'px';
            item.style.top = e.clientY + 'px';
        }

        function onPointerMove(e) {
            if (!activeDrag) return;
            const { item, offsetX, offsetY } = activeDrag;
            
            // Update position
            item.style.left = (e.clientX - offsetX) + 'px';
            item.style.top = (e.clientY - offsetY) + 'px';
        }

        function onPointerUp(e) {
            if (!activeDrag) return;
            const item = activeDrag.item;
            item.classList.remove('dragging');
            // item.releasePointerCapture(e.pointerId);
            
            document.removeEventListener('pointermove', onPointerMove);
            document.removeEventListener('pointerup', onPointerUp);
            document.removeEventListener('pointercancel', onPointerUp);
            
            activeDrag = null;
            
            checkCombinations(item);
        }

        /**
         * COMBINATION / COLLISION LOGIC
         */
        function checkCombinations(draggedItem) {
            const workspaceRect = DOM.workspace.getBoundingClientRect();
            const rectA = draggedItem.getBoundingClientRect();
            
            // Center of dragged item
            const cxA = rectA.left + rectA.width / 2;
            const cyA = rectA.top + rectA.height / 2;

            // If dragged outside the workspace, maybe destroy it?
            // (Optional: let's keep it if dropped in sidebar we destroy)
            // Removing destroy logic when dragging off-screen. It's safer to just let it drop.

            const items = Array.from(document.querySelectorAll('.canvas-item')).filter(el => el !== draggedItem);
            
            let closestItem = null;
            let minDistance = 50; // Distance threshold for combining

            for (let targetItem of items) {
                // Ignore combining/dying items
                if (targetItem.classList.contains('combining')) continue;

                const rectB = targetItem.getBoundingClientRect();
                const cxB = rectB.left + rectB.width / 2;
                const cyB = rectB.top + rectB.height / 2;
                
                const dist = Math.hypot(cxA - cxB, cyA - cyB);
                
                if (dist < minDistance) {
                    minDistance = dist;
                    closestItem = targetItem;
                }
            }

            if (closestItem) {
                attemptCombine(draggedItem, closestItem);
            }
        }

        function attemptCombine(item1, item2) {
            const id1 = item1.dataset.id;
            const id2 = item2.dataset.id;
            
            // Alphabetize IDs for consistent recipe keys (e.g., 'earth+water' vs 'water+earth')
            const sortedIds = [id1, id2].sort();
            const recipeKey = `${sortedIds[0]}+${sortedIds[1]}`;
            
            const resultId = RECIPES[recipeKey];
            
            if (resultId) {
                // Success! Combine them.
                
                // Visual feedback: merge and destroy both
                item1.classList.add('combining');
                item2.classList.add('combining');
                
                // Find mid-point for the spawn
                const x = (parseFloat(item1.style.left) + parseFloat(item2.style.left)) / 2;
                const y = (parseFloat(item1.style.top) + parseFloat(item2.style.top)) / 2;
                
                setTimeout(() => {
                    item1.remove();
                    item2.remove();
                    
                    const isNew = !unlockedElements.has(resultId);
                    if (isNew) {
                        unlockedElements.add(resultId);
                        renderSidebar();
                    }
                    
                    createCanvasItem(resultId, x, y, isNew);
                }, 350); // wait for combine animation
            } else {
                // Rebound or wobble animation for failure (optional, skipping for brevity)
                // They just sit on top of each other right now, which is standard Alchemy game behavior.
            }
        }

        function clearWorkspace() {
            const items = document.querySelectorAll('.canvas-item');
            items.forEach(item => item.remove());
        }

        // Start
        init();
    </script>
</body>
</html>

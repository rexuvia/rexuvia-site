<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Garden</title>
    <style>
        :root {
            --bg-dark: #050510;
            --bg-panel: #0a0a1a;
            --primary: #1a0a3a;
            --accent: #b44fff;
            --accent2: #00d4ff;
            --text: #e8e0ff;
            --glow: rgba(180, 79, 255, 0.4);
        }

        * { box-sizing: border-box; }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap');

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Exo 2', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            overscroll-behavior: none;
            overflow: hidden;
        }

        /* Starfield background */
        #starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Sidebar Container */
        #sidebar {
            width: 300px;
            background: linear-gradient(180deg, #0a0a20 0%, #05050f 100%);
            padding: 16px;
            overflow-y: auto;
            border-right: 1px solid rgba(180, 79, 255, 0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 200;
            box-shadow: 2px 0 30px rgba(180, 79, 255, 0.15);
            position: relative;
        }

        #sidebar-title {
            text-align: center;
            margin: 0 0 4px 0;
        }

        #sidebar-title .title-main {
            display: block;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b44fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #sidebar-title .title-sub {
            display: block;
            font-size: 0.7rem;
            color: #6060a0;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .stats {
            text-align: center;
            font-size: 0.8em;
            color: #6060a0;
            padding: 6px;
            border: 1px solid rgba(180, 79, 255, 0.2);
            border-radius: 8px;
            background: rgba(180, 79, 255, 0.05);
        }

        .stats span {
            color: var(--accent);
            font-weight: 600;
        }

        #search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(180, 79, 255, 0.3);
            border-radius: 8px;
            color: var(--text);
            padding: 8px 12px;
            width: 100%;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(180, 79, 255, 0.2);
        }

        #search-box::placeholder {
            color: #404070;
        }

        #element-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .element-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 4px;
            background: linear-gradient(135deg, rgba(26, 10, 58, 0.8), rgba(10, 5, 30, 0.9));
            border: 1px solid rgba(180, 79, 255, 0.25);
            border-radius: 10px;
            cursor: grab;
            user-select: none;
            transition: all 0.2s ease;
            touch-action: none;
            position: relative;
            overflow: hidden;
        }

        .element-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(180,79,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .element-btn:hover {
            border-color: rgba(180, 79, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(180, 79, 255, 0.25);
        }

        .element-btn:hover::before {
            opacity: 1;
        }

        .element-btn.is-new {
            border-color: rgba(0, 212, 255, 0.7);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
            animation: newPulse 1.5s ease-out;
        }

        @keyframes newPulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(0, 212, 255, 0); }
            100% { box-shadow: 0 0 12px rgba(0, 212, 255, 0.3); }
        }

        .element-btn:active { cursor: grabbing; }

        .element-emoji {
            font-size: 28px;
            margin-bottom: 4px;
            pointer-events: none;
            line-height: 1;
        }

        .element-name {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #b0a0e0;
            pointer-events: none;
            text-align: center;
            line-height: 1.2;
        }

        /* Workspace Canvas */
        #workspace {
            flex-grow: 1;
            position: relative;
            background: transparent;
            z-index: 1;
        }

        .canvas-item {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            cursor: grab;
            user-select: none;
            transform: translate(-50%, -50%);
            transition: filter 0.2s, opacity 0.3s;
            z-index: 10;
            touch-action: none;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
        }

        .canvas-item::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180,79,255,0.15) 0%, transparent 70%);
            z-index: -1;
        }

        .canvas-item:active {
            cursor: grabbing;
            z-index: 100 !important;
        }

        .canvas-item .element-emoji {
            font-size: 44px;
            margin: 0;
            pointer-events: none;
        }

        .canvas-item .element-name {
            font-size: 10px;
            background: rgba(5, 5, 20, 0.85);
            border: 1px solid rgba(180, 79, 255, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: -3px;
            pointer-events: none;
            white-space: nowrap;
        }

        .canvas-item.dragging {
            z-index: 100;
            filter: drop-shadow(0 0 20px rgba(180, 79, 255, 0.8)) brightness(1.3);
        }

        .canvas-item.combining {
            animation: combineAnim 0.45s ease-out forwards;
        }

        .canvas-item.new-discovery {
            animation: popAnim 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Combo flash overlay */
        .combo-flash {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: flashAnim 0.5s ease-out forwards;
            z-index: 500;
        }

        @keyframes flashAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        #controls {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 10px;
            z-index: 150;
        }

        .ctrl-btn {
            padding: 10px 18px;
            border: 1px solid rgba(180, 79, 255, 0.4);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        #clear-btn {
            background: rgba(180, 79, 255, 0.15);
            color: var(--accent);
        }

        #clear-btn:hover {
            background: rgba(180, 79, 255, 0.3);
            box-shadow: 0 0 15px rgba(180, 79, 255, 0.3);
        }

        #reset-btn {
            background: rgba(255, 60, 60, 0.1);
            color: #ff6060;
            border-color: rgba(255, 60, 60, 0.3);
        }

        #reset-btn:hover {
            background: rgba(255, 60, 60, 0.25);
            box-shadow: 0 0 15px rgba(255, 60, 60, 0.2);
        }

        /* Discovery toast */
        #toast-container {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
            pointer-events: none;
        }

        .toast {
            background: linear-gradient(135deg, rgba(10,5,30,0.95), rgba(26,10,58,0.95));
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 10px;
            padding: 10px 18px;
            color: var(--accent2);
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.25);
            animation: toastIn 0.3s ease-out, toastOut 0.4s ease-in 2.5s forwards;
            white-space: nowrap;
        }

        .toast .toast-emoji {
            font-size: 1.3em;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-16px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-10px) scale(0.95); }
        }

        @keyframes combineAnim {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; filter: brightness(1); }
            40% { transform: translate(-50%, -50%) scale(1.4); filter: brightness(2.5) drop-shadow(0 0 25px white); }
            100% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; filter: brightness(3); }
        }

        @keyframes popAnim {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.25); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(0.95); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* Hint bar */
        #hint-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #404070;
            pointer-events: none;
            z-index: 5;
            letter-spacing: 0.5px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            #sidebar { width: 100%; height: 38vh; border-right: none; border-top: 1px solid rgba(180,79,255,0.3); }
            #workspace { height: 62vh; }
            .canvas-item .element-emoji { font-size: 36px; }
            #element-list { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); }
            #hint-bar { display: none; }
        }

        /* Scrollbar styling */
        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-track { background: transparent; }
        #sidebar::-webkit-scrollbar-thumb { background: rgba(180,79,255,0.3); border-radius: 2px; }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="sidebar">
        <div id="sidebar-title">
            <span class="title-main">Cosmic Garden</span>
            <span class="title-sub">Stellar Synthesis</span>
        </div>
        <div class="stats" id="stats">Seeds of cosmos: <span id="stat-num">4</span> / <span id="stat-total">?</span></div>
        <input type="text" id="search-box" placeholder="🔍 Search elements..." autocomplete="off">
        <div id="element-list"></div>
    </div>

    <div id="workspace">
        <div id="controls">
            <button class="ctrl-btn" id="clear-btn">✦ Clear</button>
            <button class="ctrl-btn" id="reset-btn">↺ Reset</button>
        </div>
        <div id="hint-bar">Drag &amp; drop elements to combine them</div>
    </div>

    <div id="toast-container"></div>

    <script>
        // ─────────────────────────────────────────────────────────────────────
        //  COSMIC GARDEN — A unique cosmic/botanical synthesis game
        //  Starting elements: Stardust, Void, Photon, Gravity
        //  Theme: cosmic phenomena, stellar bodies, strange life forms
        // ─────────────────────────────────────────────────────────────────────

        const ELEMENTS = {
            // === PRIMORDIALS (starting 4) ===
            stardust:    { name: 'Stardust',    emoji: '✨', tier: 0 },
            void:        { name: 'Void',         emoji: '🌑', tier: 0 },
            photon:      { name: 'Photon',       emoji: '💡', tier: 0 },
            gravity:     { name: 'Gravity',      emoji: '🌀', tier: 0 },

            // === TIER 1 ===
            nebula:      { name: 'Nebula',       emoji: '🌌', tier: 1 },
            blackhole:   { name: 'Black Hole',   emoji: '🕳️', tier: 1 },
            protostar:   { name: 'Protostar',    emoji: '🌟', tier: 1 },
            darkmatter:  { name: 'Dark Matter',  emoji: '🫥', tier: 1 },
            aurora:      { name: 'Aurora',       emoji: '🌈', tier: 1 },
            quasar:      { name: 'Quasar',       emoji: '🔭', tier: 1 },
            singularity: { name: 'Singularity',  emoji: '⚫', tier: 1 },
            radiance:    { name: 'Radiance',     emoji: '☀️', tier: 1 },

            // === TIER 2 ===
            star:        { name: 'Star',         emoji: '⭐', tier: 2 },
            pulsar:      { name: 'Pulsar',       emoji: '📡', tier: 2 },
            comet:       { name: 'Comet',        emoji: '☄️', tier: 2 },
            cosmicseed:  { name: 'Cosmic Seed',  emoji: '🌰', tier: 2 },
            rift:        { name: 'Rift',         emoji: '🌊', tier: 2 },
            stellarwind: { name: 'Stellar Wind', emoji: '💨', tier: 2 },
            cosmicice:   { name: 'Cosmic Ice',   emoji: '🧊', tier: 2 },
            magnetar:    { name: 'Magnetar',     emoji: '🧲', tier: 2 },

            // === TIER 3 ===
            planet:      { name: 'Planet',       emoji: '🪐', tier: 3 },
            moonflower:  { name: 'Moon Flower',  emoji: '🌸', tier: 3 },
            voidbloom:   { name: 'Void Bloom',   emoji: '🌺', tier: 3 },
            crystalvine: { name: 'Crystal Vine', emoji: '💎', tier: 3 },
            sporecloud:  { name: 'Spore Cloud',  emoji: '🍄', tier: 3 },
            galacticweb: { name: 'Galactic Web', emoji: '🕸️', tier: 3 },
            astralkelp:  { name: 'Astral Kelp',  emoji: '🌿', tier: 3 },
            photonbark:  { name: 'Photon Bark',  emoji: '🪵', tier: 3 },
            nebulagrass: { name: 'Nebula Grass', emoji: '🌾', tier: 3 },
            cosmicmoss:  { name: 'Cosmic Moss',  emoji: '🍀', tier: 3 },

            // === TIER 4 ===
            lifeform:    { name: 'Life Form',    emoji: '🦠', tier: 4 },
            voidwhale:   { name: 'Void Whale',   emoji: '🐋', tier: 4 },
            stellarbee:  { name: 'Stellar Bee',  emoji: '🐝', tier: 4 },
            cosmicfish:  { name: 'Cosmic Fish',  emoji: '🐠', tier: 4 },
            nebulafern:  { name: 'Nebula Fern',  emoji: '🌿', tier: 4 },
            starbird:    { name: 'Star Bird',    emoji: '🦜', tier: 4 },
            quantumorb:  { name: 'Quantum Orb',  emoji: '🔮', tier: 4 },
            photovine:   { name: 'Photo Vine',   emoji: '🌱', tier: 4 },

            // === TIER 5 (legendary) ===
            cosmicforest:{ name: 'Cosmic Forest',emoji: '🌲', tier: 5 },
            voidgarden:  { name: 'Void Garden',  emoji: '🌻', tier: 5 },
            stellargrove:{ name: 'Stellar Grove',emoji: '🏡', tier: 5 },
            universaltree:{name:'Universal Tree',emoji: '🌳', tier: 5 },
            cosmicgarden:{ name: 'Cosmic Garden',emoji: '🌠', tier: 5 },
        };

        // Every recipe: sorted alphabetically by key components
        const RECIPES = {
            // Tier 0 → Tier 1
            'stardust+void':      'nebula',
            'gravity+void':       'blackhole',
            'photon+stardust':    'protostar',
            'darkmatter+void':    'singularity',      // needs dark matter
            'aurora+photon':      'radiance',
            'blackhole+photon':   'quasar',
            'gravity+stardust':   'darkmatter',
            'aurora+void':        'darkmatter',
            'photon+void':        'aurora',

            // Tier 1 → Tier 2
            'nebula+protostar':   'star',
            'blackhole+gravity':  'singularity',
            'nebula+photon':      'stellarwind',
            'comet+stardust':     'comet',            // self-ref guard below
            'gravity+nebula':     'comet',
            'singularity+stardust':'cosmicseed',
            'blackhole+rift':     'rift',             // guard
            'darkmatter+gravity': 'rift',
            'stardust+stellarwind':'nebulagrass',     // shortcut
            'photon+singularity': 'pulsar',
            'gravity+radiance':   'magnetar',
            'aurora+stardust':    'cosmicice',

            // Tier 2 → Tier 3
            'cosmicseed+planet':  'moonflower',
            'cosmicseed+void':    'voidbloom',
            'cosmicice+cosmicseed':'crystalvine',
            'nebula+sporecloud':  'sporecloud',       // guard
            'nebula+stellarwind': 'sporecloud',
            'galacticweb+nebula': 'galacticweb',
            'darkmatter+nebula':  'galacticweb',
            'photon+star':        'astralkelp',
            'photonbark+stardust':'photonbark',       // guard
            'photon+stellarwind': 'photonbark',
            'stardust+star':      'nebulagrass',
            'cosmicice+stardust': 'cosmicmoss',
            'planet+star':        'planet',           // guard
            'comet+gravity':      'planet',

            // Tier 3 → Tier 4
            'cosmicmoss+lifeform':'lifeform',         // guard
            'cosmicmoss+nebulagrass':'lifeform',
            'planet+voidbloom':   'voidwhale',
            'moonflower+stellarbee':'stellarbee',
            'astralkelp+photon':  'stellarbee',
            'cosmicfish+planet':  'cosmicfish',
            'astralkelp+lifeform':'cosmicfish',
            'nebula+starbird':    'starbird',
            'moonflower+starbird':'starbird',
            'photonbark+stardust':'starbird',
            'moonflower+photon':  'starbird',
            'crystalvine+rift':   'quantumorb',
            'photovine+stardust': 'photovine',
            'astralkelp+cosmicseed':'photovine',

            // Tier 4 → Tier 5
            'voidbloom+voidwhale':'voidgarden',
            'stellarbee+voidgarden':'voidgarden',     // guard
            'cosmicforest+planet':'cosmicforest',
            'photovine+starbird': 'cosmicforest',
            'astralkelp+voidwhale':'cosmicforest',
            'stellargrove+voidgarden':'stellargrove', // guard
            'cosmicforest+voidgarden':'stellargrove',
            'universaltree+stellargrove':'universaltree',
            'cosmicforest+quantumorb':'universaltree',
            'stellargrove+universaltree':'cosmicgarden',
            'cosmicgarden+universaltree':'cosmicgarden', // ultimate

            // Extra creative combos
            'magnetar+pulsar':    'quantumorb',
            'rift+singularity':   'blackhole',
            'quasar+stardust':    'cosmicseed',
            'radiance+voidbloom': 'moonflower',
            'stellarwind+void':   'sporecloud',
            'comet+moonflower':   'crystalvine',
            'magnetar+star':      'pulsar',
            'aurora+nebula':      'cosmicice',
        };

        // Build a clean recipe map (guard: prevent self-combining identity issues)
        const CLEAN_RECIPES = {};
        for (const [key, val] of Object.entries(RECIPES)) {
            const parts = key.split('+');
            if (parts[0] !== val && parts[1] !== val) {
                CLEAN_RECIPES[key] = val;
            }
        }

        // ─── STATE ────────────────────────────────────────────────────────────
        const STARTERS = ['stardust', 'void', 'photon', 'gravity'];
        let unlockedElements = new Set(STARTERS);
        let newlyUnlocked = new Set();

        const DOM = {
            sidebarList: document.getElementById('element-list'),
            workspace: document.getElementById('workspace'),
            statNum: document.getElementById('stat-num'),
            statTotal: document.getElementById('stat-total'),
            clearBtn: document.getElementById('clear-btn'),
            resetBtn: document.getElementById('reset-btn'),
            searchBox: document.getElementById('search-box'),
            toastContainer: document.getElementById('toast-container'),
        };

        let highestZ = 10;
        let activeDrag = null;
        let searchQuery = '';

        // ─── STARFIELD ───────────────────────────────────────────────────────
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const stars = Array.from({ length: 200 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5 + 0.2,
                alpha: Math.random() * 0.6 + 0.2,
                speed: Math.random() * 0.3 + 0.05,
                phase: Math.random() * Math.PI * 2,
            }));

            let t = 0;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                t += 0.01;
                for (const s of stars) {
                    const a = s.alpha * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(220, 200, 255, ${a})`;
                    ctx.fill();
                }
                requestAnimationFrame(draw);
            }
            draw();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // ─── SIDEBAR RENDER ───────────────────────────────────────────────────
        function renderSidebar() {
            const q = searchQuery.toLowerCase().trim();
            DOM.sidebarList.innerHTML = '';

            const sorted = Array.from(unlockedElements).sort((a, b) => {
                const ta = ELEMENTS[a].tier, tb = ELEMENTS[b].tier;
                if (ta !== tb) return ta - tb;
                return ELEMENTS[a].name.localeCompare(ELEMENTS[b].name);
            });

            sorted.forEach(id => {
                const el = ELEMENTS[id];
                if (q && !el.name.toLowerCase().includes(q)) return;

                const btn = document.createElement('div');
                btn.className = 'element-btn';
                if (newlyUnlocked.has(id)) btn.classList.add('is-new');
                btn.dataset.id = id;
                btn.title = `${el.name} (Tier ${el.tier})`;
                btn.innerHTML = `
                    <div class="element-emoji">${el.emoji}</div>
                    <div class="element-name">${el.name}</div>
                `;
                btn.addEventListener('pointerdown', (e) => handleSidebarPointerDown(e, id));
                DOM.sidebarList.appendChild(btn);
            });

            DOM.statNum.textContent = unlockedElements.size;
            DOM.statTotal.textContent = Object.keys(ELEMENTS).length;
        }

        // ─── TOAST ───────────────────────────────────────────────────────────
        function showToast(id) {
            const el = ELEMENTS[id];
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span class="toast-emoji">${el.emoji}</span> Discovered: <b>${el.name}</b>!`;
            DOM.toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ─── DRAG LOGIC ───────────────────────────────────────────────────────
        function handleSidebarPointerDown(e, id) {
            e.preventDefault();
            const canvasItem = createCanvasItem(id, e.clientX, e.clientY);
            startDragging(canvasItem, e);
        }

        function createCanvasItem(id, x, y, isNew = false) {
            const el = ELEMENTS[id];
            const item = document.createElement('div');
            item.className = 'canvas-item' + (isNew ? ' new-discovery' : '');
            item.dataset.id = id;
            item.style.left = x + 'px';
            item.style.top = y + 'px';
            item.style.zIndex = ++highestZ;
            item.innerHTML = `
                <div class="element-emoji">${el.emoji}</div>
                <div class="element-name">${el.name}</div>
            `;
            item.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                startDragging(item, e);
            });
            DOM.workspace.appendChild(item);
            if (isNew) setTimeout(() => item.classList.remove('new-discovery'), 600);
            return item;
        }

        function startDragging(item, e) {
            item.style.zIndex = ++highestZ;
            item.classList.add('dragging');
            activeDrag = { item };
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerup', onPointerUp);
            document.addEventListener('pointercancel', onPointerUp);
            item.style.left = e.clientX + 'px';
            item.style.top = e.clientY + 'px';
        }

        function onPointerMove(e) {
            if (!activeDrag) return;
            activeDrag.item.style.left = e.clientX + 'px';
            activeDrag.item.style.top = e.clientY + 'px';
        }

        function onPointerUp(e) {
            if (!activeDrag) return;
            const item = activeDrag.item;
            item.classList.remove('dragging');
            document.removeEventListener('pointermove', onPointerMove);
            document.removeEventListener('pointerup', onPointerUp);
            document.removeEventListener('pointercancel', onPointerUp);
            activeDrag = null;
            checkCombinations(item);
        }

        // ─── COMBINATION LOGIC ────────────────────────────────────────────────
        function checkCombinations(draggedItem) {
            const itemRect = draggedItem.getBoundingClientRect();
            const cxA = itemRect.left + itemRect.width / 2;
            const cyA = itemRect.top + itemRect.height / 2;

            const items = Array.from(document.querySelectorAll('.canvas-item'))
                .filter(el => el !== draggedItem && !el.classList.contains('combining'));

            let closest = null, minDist = 55;

            for (const target of items) {
                const r = target.getBoundingClientRect();
                const dist = Math.hypot(cxA - (r.left + r.width / 2), cyA - (r.top + r.height / 2));
                if (dist < minDist) { minDist = dist; closest = target; }
            }

            if (closest) attemptCombine(draggedItem, closest);
        }

        function attemptCombine(item1, item2) {
            const [id1, id2] = [item1.dataset.id, item2.dataset.id].sort();
            const key = `${id1}+${id2}`;
            const resultId = CLEAN_RECIPES[key];

            if (!resultId || !ELEMENTS[resultId]) return;

            item1.classList.add('combining');
            item2.classList.add('combining');

            const mx = (parseFloat(item1.style.left) + parseFloat(item2.style.left)) / 2;
            const my = (parseFloat(item1.style.top) + parseFloat(item2.style.top)) / 2;

            // Flash effect
            const flash = document.createElement('div');
            flash.className = 'combo-flash';
            flash.style.left = mx + 'px';
            flash.style.top = my + 'px';
            DOM.workspace.appendChild(flash);
            setTimeout(() => flash.remove(), 600);

            setTimeout(() => {
                item1.remove();
                item2.remove();

                const isNew = !unlockedElements.has(resultId);
                if (isNew) {
                    unlockedElements.add(resultId);
                    newlyUnlocked.add(resultId);
                    showToast(resultId);
                    renderSidebar();
                    // Remove new highlight after a bit
                    setTimeout(() => {
                        newlyUnlocked.delete(resultId);
                        renderSidebar();
                    }, 4000);
                }

                createCanvasItem(resultId, mx, my, isNew);
            }, 400);
        }

        function clearWorkspace() {
            document.querySelectorAll('.canvas-item').forEach(i => i.remove());
        }

        function resetGame() {
            if (!confirm('Reset all progress? You\'ll lose all discovered elements.')) return;
            clearWorkspace();
            unlockedElements = new Set(STARTERS);
            newlyUnlocked.clear();
            renderSidebar();
        }

        // ─── INIT ─────────────────────────────────────────────────────────────
        function init() {
            initStarfield();
            renderSidebar();
            DOM.clearBtn.addEventListener('click', clearWorkspace);
            DOM.resetBtn.addEventListener('click', resetGame);
            DOM.searchBox.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderSidebar();
            });
            document.addEventListener('dragstart', e => e.preventDefault());
        }

        init();
    </script>
</body>
</html>

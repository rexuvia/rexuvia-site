<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Spiral (Wasm)</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <h1>Prime Spiral</h1>
    <p>Loading Wasm module...</p>
  </div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    
    let wasmMemory;
    let generate_spiral;
    let is_prime;
    
    let scale = 5.0;
    const TOTAL_POINTS = 50000;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      draw();
    }

    async function initWasm() {
      try {
        const memory = new WebAssembly.Memory({ initial: 256, maximum: 256 }); // 16MB
        wasmMemory = memory;

        const imports = {
          env: {
            memory: memory,
            cos: Math.cos,
            sin: Math.sin,
            sqrt: Math.sqrt
          }
        };

        const response = await fetch('core.wasm');
        const buffer = await response.arrayBuffer();
        const module = await WebAssembly.instantiate(buffer, imports);

        generate_spiral = module.instance.exports.generate_spiral;
        is_prime = module.instance.exports.is_prime;

        window.addEventListener('resize', resize);
        resize(); // initial draw
      } catch (err) {
        hud.innerHTML += `<p style="color:red">Error loading wasm: ${err.message}</p>`;
        console.error(err);
      }
    }

    function draw() {
        if (!generate_spiral) return;
        
        const w = canvas.width;
        const h = canvas.height;
        const cx = w / 2;
        const cy = h / 2;
        
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#0ff';
        
        const t0 = performance.now();
        
        // Mode 1 (Archimedean/Sacks)
        let mode = 1;
        
        // Call wasm
        const drawnCount = generate_spiral(
            TOTAL_POINTS,
            mode,
            scale,
            cx, cy,
            w, h
        );
        
        const t1 = performance.now();
        
        // Render from memory
        // Each point is 8 bytes (2 x f32)
        const pointData = new Float32Array(wasmMemory.buffer, 0, drawnCount * 2);
        
        ctx.beginPath();
        for (let i = 0; i < drawnCount; i++) {
            const x = pointData[i * 2];
            const y = pointData[i * 2 + 1];
            ctx.rect(x, y, 1.5, 1.5); // small square per prime
        }
        ctx.fill();
        
        const renderTime = performance.now() - t1;
        const totalTime = performance.now() - t0;
        
        hud.innerHTML = `
            <h1>Prime Spiral</h1>
            <p>Sacks Spiral (Archimedean)</p>
            <p>Checking up to: ${TOTAL_POINTS.toLocaleString()}</p>
            <p>Primes drawn: ${drawnCount.toLocaleString()}</p>
            <p style="font-size:0.8em; color:#aaa">Compute: ${(t1-t0).toFixed(1)}ms | Render: ${renderTime.toFixed(1)}ms</p>
            <p style="font-size:0.8em; color:#888">Scroll to zoom</p>
        `;
    }

    // Zooming
    canvas.addEventListener('wheel', (e) => {
        const zoomSpeed = 0.1;
        if (e.deltaY > 0) {
            scale *= (1 - zoomSpeed);
        } else {
            scale *= (1 + zoomSpeed);
        }
        // clamp scale
        scale = Math.max(0.1, Math.min(scale, 100.0));
        draw();
    });

    initWasm();
  </script>
</body>
</html>
